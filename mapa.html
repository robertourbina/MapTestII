<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Mapa Leaflet</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
height: 500px;
width: 100%;
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([19.4326, -99.1332], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '© OpenStreetMap contributors'
}).addTo(map);

L.marker([19.4326, -99.1332])
.addTo(map)
.bindPopup("Ciudad de México")
.openPopup();

L.marker([20.6597, -103.3496])
.addTo(map)
.bindPopup("Guadalajara");

L.marker([25.6866, -100.3161])
.addTo(map)
.bindPopup("Monterrey");

</script>

</body>
</html>
